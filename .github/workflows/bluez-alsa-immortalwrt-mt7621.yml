name: Build Bluez-Alsa APK for MT7621 (ImmortalWrt 25.12)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo -E apt -yqq update
        sudo -E apt -yqq full-upgrade
        sudo -E apt -yqq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file libfuse-dev
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo mkdir -p /srcdir
        sudo chown $USER:$GROUPS /srcdir

    - name: Clone source code
      working-directory: /srcdir
      run: |
        git clone $REPO_URL --depth=1 --single-branch --branch $REPO_BRANCH openwrt
        ln -sf /srcdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update and Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Custom Add bluezalsa Source
      run: |
        cd openwrt
        # 强制拉取 4.3.1 版本的 bluez-alsa 源码补全 MIPS 库的缺失
        wget -qO - https://github.com/raphikWasHere/bluealsa4openwrt/raw/main/bluez-alsa/packages/full.tar.gz | tar -zxvf - -C ./
        sed -i 's/4.1.1/4.3.1/g' ./feeds/packages/sound/bluez-alsa/Makefile
        sed -i 's/b69a3e6dd69315194403ee930ac1553aed3fb9a3988e502ae5c24a8bfef70f9f/933fe898dfac21fdfeb5f4ffa685c2aa2db9c064d639170ac2652f156e956a2a/g' ./feeds/packages/sound/bluez-alsa/Makefile
        rm -rf ./feeds/packages/sound/bluez-alsa/patches/
        ./scripts/feeds update
        ./scripts/feeds install bluez-alsa

    - name: Configure Target for MT7621
      run: |
        cd openwrt
        # 核心修改：锁定目标架构为 MT7621 所在的 ramips/mt7621 平台
        echo "CONFIG_TARGET_ramips=y" > .config
        echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
        
        make defconfig
        
        # 将 bluez-alsa 及相关底层依赖强行激活为模块化编译（生成 apk）
        echo "CONFIG_PACKAGE_bluez-alsa=m" >> .config
        echo "CONFIG_PACKAGE_bluez-utils=m" >> .config
        echo "CONFIG_PACKAGE_bluez-daemon=m" >> .config
        
        # 补全可能缺失的音频依赖库（如 sbc、fdk-aac 等）
        make defconfig

    - name: Download Tools & Toolchain
      run: |
        cd openwrt
        make tools/download V=s
        make toolchain/download V=s
        make package/feeds/packages/bluez-alsa/download V=s

    - name: Compile Toolchain
      run: |
        cd openwrt
        make tools/install -j$(nproc) || make tools/install V=s
        make toolchain/install -j$(nproc) || make toolchain/install V=s

    - name: Compile Packages
      run: |
        cd openwrt
        # 精确单独编译组件
        make package/utils/bluez/compile -j$(nproc) V=s
        make package/feeds/packages/bluez-alsa/compile -j$(nproc) V=s

    - name: Organize APK Files
      id: organize
      run: |
        cd openwrt/bin/packages/
        mkdir -p $GITHUB_WORKSPACE/mt7621-apks
        
        # 提取专为 MT7621 编译出来的全部蓝牙音频相关的 apk 包
        find . -name "*bluez*.apk" -exec cp {} $GITHUB_WORKSPACE/mt7621-apks/ \;
        find . -name "*sbc*.apk" -exec cp {} $GITHUB_WORKSPACE/mt7621-apks/ \;
        find . -name "*dbus*.apk" -exec cp {} $GITHUB_WORKSPACE/mt7621-apks/ \;
        
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: ImmortalWrt_25.12_MT7621_Bluez_APKs
        path: ${{ github.workspace }}/mt7621-apks/
